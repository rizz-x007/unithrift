<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniThrift | Review Queue</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
    document.documentElement.className = localStorage.getItem("theme") || "dark-theme";
    document.addEventListener("DOMContentLoaded", () => {
        document.body.className = localStorage.getItem("theme") || "dark-theme";
    });
</script>
<style>
  :root{
    --bg:#0c0d15; --panel:#151726; --panel-2:#1b1e30; --line:rgba(255,255,255,0.08);
    --purple:#7c5cff; --purple-dim:rgba(124,92,255,0.15);
    --green:#34d399; --red:#ff6b6b;
    --text:#e9e9f2; --muted:#8b8d9c;
  }
  html.light-theme, body.light-theme {
    --bg: #f8f5ff;
    --panel: rgba(255, 255, 255, 0.65);
    --panel-2: rgba(170, 150, 255, 0.12);
    --line: rgba(170, 150, 255, 0.3);
    --purple: #8b5cf6;
    --purple-dim: rgba(139, 92, 246, 0.15);
    --green: #059669;
    --red: #ef4444;
    --text: #2f2545;
    --muted: #6d6486;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;height:100vh;overflow:hidden;}
  .mono{font-family:'JetBrains Mono',monospace;}

  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;border-bottom:1px solid var(--line);background:var(--panel);
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:0.3px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--purple);box-shadow:0 0 10px var(--purple);}
  .brand small{color:var(--muted);font-weight:500;font-size:0.75rem;margin-left:4px;}
  .tabs{display:flex;gap:4px;background:var(--panel-2);padding:4px;border-radius:10px;}
  .tab{
    border:none;background:none;color:var(--muted);font-family:'JetBrains Mono',monospace;
    font-size:0.78rem;padding:7px 14px;border-radius:7px;cursor:pointer;transition:.15s;
  }
  .tab.active{background:var(--purple);color:#fff;}
  .tab .count{opacity:0.8;margin-left:5px;}
  #logoutLink{color:var(--muted);text-decoration:none;font-size:0.85rem;}
  #logoutLink:hover{color:var(--text);}

  .layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 61px);}

  .queue{border-right:1px solid var(--line);overflow-y:auto;padding:10px;}
  .queue-empty{color:var(--muted);text-align:center;padding:60px 20px;font-size:0.85rem;}
  .q-item{
    display:flex;flex-direction:column;gap:4px;padding:12px 14px;border-radius:10px;
    cursor:pointer;margin-bottom:6px;border:1px solid transparent;transition:.12s;
  }
  .q-item:hover{background:var(--panel-2);}
  .q-item.selected{background:var(--purple-dim);border-color:var(--purple);}
  .q-top{display:flex;justify-content:space-between;align-items:center;}
  .q-name{font-weight:600;font-size:0.9rem;}
  .q-type{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

  .detail{overflow-y:auto;padding:32px 40px;}
  .detail-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:10px;}
  .detail-empty i{font-size:2rem;opacity:0.35;}

  .d-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;}
  .d-head h1{font-size:1.4rem;margin:0 0 4px;}
  .d-head .q-type{font-size:0.72rem;}
  .shortcut-hint{display:flex;gap:14px;font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--muted);}
  .shortcut-hint kbd{background:var(--panel-2);border:1px solid var(--line);border-radius:4px;padding:2px 6px;margin-right:4px;}

  .docs{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:30px;}
  .doc-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .doc-card .frame{aspect-ratio:4/3;background:var(--panel-2);display:flex;align-items:center;justify-content:center;}
  .doc-card img{width:100%;height:100%;object-fit:contain;}
  .doc-card .pdf-icon{font-size:2rem;color:var(--muted);}
  .doc-card .caption{padding:10px 12px;font-size:0.78rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
  .doc-card .caption a{color:var(--purple);text-decoration:none;}

  .actions{display:flex;gap:12px;}
  .btn{
    border:none;border-radius:10px;padding:12px 22px;font-family:'Poppins',sans-serif;font-weight:600;
    font-size:0.9rem;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.12s;
  }
  .btn:disabled{opacity:0.5;cursor:default;}
  .btn-approve{background:var(--green);color:#06281c;}
  .btn-approve:hover:not(:disabled){filter:brightness(1.08);}
  .btn-reject{background:transparent;border:1px solid var(--red);color:var(--red);}
  .btn-reject:hover:not(:disabled){background:rgba(255,107,107,0.1);}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel-2);border:1px solid var(--line);padding:12px 20px;border-radius:10px;
    font-size:0.85rem;opacity:0;pointer-events:none;transition:.25s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted);z-index:50;}
  .gate.hidden{display:none;}
</style>
</head>
<body>

<div class="gate" id="gate"><i class="fas fa-spinner fa-spin"></i><span class="mono" style="font-size:0.8rem;">Checking access…</span></div>

<header>
  <div class="brand"><span class="dot"></span>UniThrift <small>REVIEW QUEUE</small></div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-filter="all">ALL<span class="count" id="countAll">0</span></button>
    <button class="tab" data-filter="student">STUDENT<span class="count" id="countStudent">0</span></button>
    <button class="tab" data-filter="seller">SELLER<span class="count" id="countSeller">0</span></button>
  </div>
  <a href="/profile" id="logoutLink"><i class="fas fa-arrow-left"></i> Back to app</a>
</header>

<div class="layout">
  <div class="queue" id="queue"></div>
  <div class="detail" id="detail">
    <div class="detail-empty"><i class="fas fa-inbox"></i><span>Nothing selected</span></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/auth-fetch.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
