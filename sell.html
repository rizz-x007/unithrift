<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>UniThrift | Sell Item</title>

    <link rel="stylesheet" href="/css/sell.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            UniThrift
        </div>

        <div class="nav-links">

            <a href="/marketplace">
                Marketplace
            </a>

            <a href="/profile">
                Profile
            </a>

            <a href="/sell">
                Sell Item
            </a>

        </div>

    </nav>

    <section class="sell-container">

        <div class="sell-card">

            <h1>
                Create Listing
            </h1>

            <form id="sellForm">

                <input
                    type="text"
                    id="title"
                    placeholder="Product Name"
                    required>

                <select
                    id="category"
                    required>

                    <option value="">
                        Select Category
                    </option>

                    <option>
                        Books
                    </option>

                    <option>
                        Electronics
                    </option>

                    <option>
                        Lab Equipment
                    </option>

                    <option>
                        Notes
                    </option>

                    <option>
                        Hostel Items
                    </option>

                    <option>
                        Uniforms
                    </option>

                </select>

                <input
                    type="number"
                    id="price"
                    placeholder="Price"
                    required>

                <select
                    id="condition"
                    required>

                    <option value="">
                        Product Condition
                    </option>

                    <option>
                        Like New
                    </option>

                    <option>
                        Excellent
                    </option>

                    <option>
                        Good
                    </option>

                    <option>
                        Fair
                    </option>

                </select>

                <textarea
                    id="description"
                    rows="6"
                    placeholder="Description"
                    required>
                </textarea>

                <input
                    type="text"
                    id="collectionPoint"
                    placeholder="Collection / Pickup Point (e.g., Hostel 2 Lounge, Main Gate)"
                    required>

                <input
                    type="tel"
                    id="contactNo"
                    placeholder="Contact Number / WhatsApp"
                    required>

                <input
                    type="date"
                    id="deliveryDate">

                <input
                    type="text"
                    id="paymentMethods"
                    placeholder="UPI, Cash, Bank Transfer">

                <label>
                    Upload Product Images
                </label>

                <input
                    type="file"
                    id="productImages"
                    multiple
                    accept="image/*">

                <div id="previewContainer">

                </div>

                <div class="cf-turnstile" data-sitekey="0x4AAAAAADyHfUVt4-tqoZhk" data-theme="light" style="margin-bottom: 1rem;"></div>

                <div class="verification-box">

                    <h3>
                        AI Verification
                    </h3>

                    <p>
                        Uploaded images will be checked
                        for visible damage before approval.
                    </p>

                    <div id="verificationStatus">

                        Awaiting Upload...

                    </div>

                </div>

                <button type="submit">

                    Publish Listing

                </button>

            </form>

        </div>

    </section>

    <footer>

        © 2026 UniThrift

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="/js/auth-fetch.js"></script>
    <script src="/js/sell.js"></script>

</body>

</html>
