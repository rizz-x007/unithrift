<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniThrift | Chat Workspace</title>
    <link rel="stylesheet" href="/css/chat.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">UniThrift</div>
        <div class="nav-links">
            <a href="/marketplace">Marketplace</a>
            <a href="/sell">Sell Item</a>
            <a href="/profile">Profile</a>
        </div>
    </nav>

    <main class="chat-workspace">
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h3>Active Chats</h3>
            </div>
            <div id="conversationsList" class="conversations-list">
                <div class="conversation-item active">
                    <div class="conv-avatar">💬</div>
                    <div class="conv-meta">
                        <h4 id="sidebarSellerName">Loading...</h4>
                        <p id="sidebarProductTitle">Context Listing</p>
                    </div>
                </div>
            </div>
        </aside>

        <section class="chat-window">
            <header class="chat-header">
                <div class="active-party-details">
                    <h2 id="chatHeaderName">Connecting...</h2>
                    <span id="chatProductBadge" class="product-context-badge">Item Context</span>
                </div>
            </header>

            <div id="chatMessages" class="chat-messages">
                <div class="system-message">
                    🔒 Security Notice: Keep payments within UniThrift for secure checkout processing.
                </div>
            </div>

            <footer class="chat-footer">
                <form id="chatForm">
                    <label for="imageUpload" class="control-btn" title="Upload Image">
                        📷
                        <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                    </label>

                    <button type="button" id="voiceMemoBtn" class="control-btn" title="Record Voice Note">
                        🎙️
                    </button>

                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Type your message here..." 
                        autocomplete="off"
                        required>

                    <button type="submit" class="send-btn">Send</button>
                </form>
            </footer>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
